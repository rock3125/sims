name: build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build \
            libsdl2-dev libassimp-dev \
            xvfb

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -G Ninja

      - name: Build
        run: cmake --build build -j --config Release

      - name: Smoke test (headless, verify binary launches then exits)
        run: |
          timeout 5 xvfb-run -a ./build/sims || test $? -eq 124
